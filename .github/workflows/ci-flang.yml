name: flang

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:

jobs:
  build:
    name: ci
    if: github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/ci.yml

  integration-tests:
    name: ${{ matrix.toolchain.version }} ${{ matrix.image }} ${{
      matrix.toolchain.msystem }}
    if: github.actor != 'dependabot[bot]'
    runs-on: ${{ matrix.image }}
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        image: [windows-2025-vs2026]
        toolchain:
          - { compiler: flang, version: "22" }
        include:
          - image: windows-2025-vs2026
            toolchain: { compiler: flang, version: "22.1.0" } # test that patch versions are accepted and resolved correctly
          - image: windows-2025-vs2026
            toolchain: { compiler: flang, msystem: ucrt64 } # only latest version available from Pacman
          - image: windows-2025-vs2026
            toolchain: { compiler: flang, msystem: clang64 } # only latest version available from Pacman
    steps:
      - uses: actions/checkout@v6

      - name: Restore dist-tests
        uses: actions/download-artifact@v8
        with:
          name: generated-dist-tests
          path: dist-tests

      - name: Install ${{ matrix.toolchain.compiler }} ${{ matrix.toolchain.version }}
        id: setup
        uses: ./
        with:
          compiler: ${{ matrix.toolchain.compiler }}
          version: ${{ matrix.toolchain.version }}
          msystem: ${{ matrix.toolchain.msystem }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify installed version
        run: 'echo "Output: ${{ steps.setup.outputs.version }}"'

      - name: Run Integration Tests
        run: npm run integration-test
