name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: "24"

jobs:
  format-lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

  # test:
  #     name: Test
  #     runs-on: ubuntu-latest
  #     steps:
  #         - uses: actions/checkout@v6

  #         - uses: actions/setup-node@v6
  #           with:
  #               node-version: ${{ env.NODE_VERSION }}
  #               cache: npm

  #         - name: Install dependencies
  #           run: npm ci

  #         - name: Run tests
  #           run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    # needs: [ format-lint, test ]
    needs: [ format-lint ]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dist
        run: npm run build

      - name: Verify dist is up to date
        run: |
          if [ -n "$(git diff --name-only dist/)" ]; then
            echo "dist/ is out of date. Run 'npm run build' and commit the result."
            git diff dist/
            exit 1
          fi
